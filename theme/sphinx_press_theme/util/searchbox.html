<div id="searchbox" class="searchbox" role="search">
  <div class="caption">
    <div class="searchformwrapper">
      <form class="search" action="{{ pathto('search') }}" method="get" style="display: flex; align-items: center; position: relative; width: 100%;">
        <input 
          type="text" 
          id="doc-search-input"
          name="q"
          placeholder="{{ _('Search') }}..."
          aria-label="{{ _('Search') }}"
          style="box-sizing: border-box; transition: box-shadow 0.2s;"
          onfocus="this.style.boxShadow='0 0 0 2px var(--theme-accent, #3eaf7c)';"
          onblur="this.style.boxShadow='none';"
        />
        <button type="submit" aria-label="{{ _('Search') }}" style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; margin: 0; color: var(--theme-text-soft, #999);">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: block; transition: stroke 0.2s;" onmouseover="this.style.stroke='var(--theme-accent, #3eaf7c)';" onmouseout="this.style.stroke='currentColor';">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <input type="hidden" name="check_keywords" value="yes" />
        <input type="hidden" name="area" value="default" />
      </form>
    </div>
  </div>
</div>
